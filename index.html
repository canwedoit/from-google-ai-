<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill fetch in a protected environment.
      (function() {
        try {
          const nativeFetch = window.fetch;
          if (nativeFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return nativeFetch; },
              set: function() { /* Ignore attempts to overwrite fetch */ },
              configurable: true
            });
          }
        } catch (e) {
          // If we can't redefine it, we just hope for the best
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
